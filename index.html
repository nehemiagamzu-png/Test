// ── Scale nutrients by amount ────────────────────────────────────
function scaleNutrients(food, amount){
  const s = amount / food.base;
  return {
    cal:   Math.round(food.cal   * s),
    protein: Math.round(food.protein * s * 10) / 10,
    carbs:   Math.round(food.carbs   * s * 10) / 10,
    fat:     Math.round(food.fat     * s * 10) / 10,
    fiber:   Math.round(food.fiber   * s * 10) / 10,
    sugar:   Math.round(food.sugar   * s * 10) / 10,
    sodium:  Math.round(food.sodium  * s),
  };
}

// ── Goal calculation ─────────────────────────────────────────────
function calcGoals(weight, activity){
  const pm = activity==='light'?1.4:activity==='moderate'?1.7:2.0;
  const cm = activity==='light'?32:activity==='moderate'?37:42;
  const cal = Math.round(weight * cm);
  return {
    protein:  Math.round(weight * pm),
    calories: cal,
    carbs:    Math.round(cal * 0.50 / 4),
    fat:      Math.round(cal * 0.28 / 9),
    fiber:    Math.round(cal / 1000 * 14),
    sugar:    Math.round(cal * 0.10 / 4),
    sodium:   2300,
  };
}

// ── AI Image Analysis ─────────────────────────────────────────────
async function analyzeImage(base64, mimeType){
  const prompt=`You are a nutrition expert. Analyze this food photo.
Return ONLY valid JSON (no markdown):
{"items":[{"name":"Hebrew name","emoji":"emoji","grams":number,"protein":number,"calories":number,"carbs":number,"fat":number,"fiber":number,"sugar":number,"sodium":number,"confidence":"high|medium|low"}],"note":"Hebrew note max 12 words"}
Realistic portions. Numbers only. Hebrew names.`;
  const res=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,
      messages:[{role:'user',content:[
        {type:'image',source:{type:'base64',media_type:mimeType,data:base64}},
        {type:'text',text:prompt}
      ]}]})
  });
  if(!res.ok) throw new Error(res.status);
  const data=await res.json();
  return JSON.parse((data.content||[]).map(b=>b.text||'').join('').replace(/```json|```/g,'').trim());
}

// ── Ring ─────────────────────────────────────────────────────────
function Ring({value,max,color,size=120,label,sub}){
  const r=(size-16)/2,circ=2*Math.PI*r,dash=circ*Math.min(value/max,1),cx=size/2,cy=size/2;
  return(
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:6}}>
      <svg width={size} height={size} style={{transform:'rotate(-90deg)'}}>
        <circle cx={cx} cy={cy} r={r} fill="none" stroke="#1e2433" strokeWidth={10}/>
        <circle cx={cx} cy={cy} r={r} fill="none" stroke={color} strokeWidth={10}
          strokeDasharray={`${dash} ${circ}`} strokeLinecap="round"
          style={{transition:'stroke-dasharray 0.6s cubic-bezier(.4,2,.6,1)'}}/>
        <text x={cx} y={cy-6} textAnchor="middle" fill="#f0f4ff"
          style={{transform:`rotate(90deg)`,transformOrigin:`${cx}px ${cy}px`,fontSize:22,fontFamily:"'Space Grotesk',sans-serif",fontWeight:700}}>
          {Math.round(value)}
        </text>
        <text x={cx} y={cy+14} textAnchor="middle" fill="#6b7a99"
          style={{transform:`rotate(90deg)`,transformOrigin:`${cx}px ${cy}px`,fontSize:11,fontFamily:"'Space Grotesk',sans-serif"}}>
          / {max}
        </text>
      </svg>
      <div style={{textAlign:'center'}}>
        <div style={{color:'#f0f4ff',fontWeight:700,fontSize:14}}>{label}</div>
        <div style={{color:'#6b7a99',fontSize:11}}>{sub}</div>
      </div>
    </div>
  );
}

            <div style={{flex:1,height:6,borderRadius:99,background:'#1e2433',overflow:'hidden'}}>
              <div style={{height:'100%',width:`${Math.min(pct,100)}%`,background:barColor,borderRadius:99,transition:'width 0.5s'}}/>
            </div>
            <span style={{fontSize:11,fontWeight:800,color:over?(item.isMax?'#ef4444':'#ef4444'):pct>=80?'#22c55e':'#a0b0cc',minWidth:36,textAlign:'left',direction:'ltr'}}>{pct}%</span>
          </div>
        )}
      </div>
    );
  }

  const tabS=(t)=>({
    flex:1,padding:'9px 0',fontWeight:700,fontSize:12,cursor:'pointer',border:'none',background:'transparent',
    color:tab===t?'#f0f4ff':'#6b7a99',borderBottom:tab===t?'2px solid #3b82f6':'2px solid transparent',
  });

  return(
    <>
      <div onClick={onClose} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.6)',zIndex:300,animation:'fadeIn 0.2s'}}/>
      <div style={{position:'fixed',top:0,left:0,bottom:0,width:'90%',maxWidth:380,background:'#0d1117',zIndex:301,overflowY:'auto',borderLeft:'1px solid #1e2a3a',animation:'slideIn 0.28s ease',boxShadow:'-4px 0 30px rgba(0,0,0,0.5)'}}>
        {/* Header */}
        <div style={{padding:'16px 16px 0',display:'flex',justifyContent:'space-between',alignItems:'center',position:'sticky',top:0,background:'#0d1117',zIndex:10,borderBottom:'1px solid #1e2a3a',paddingBottom:10}}>
          <div>
            <div style={{fontSize:17,fontWeight:800,color:'#f0f4ff'}}>📊 ערכים תזונתיים</div>
            <div style={{fontSize:11,color:'#6b7a99',marginTop:1}}>מחושב לפי {w}ק"ג · {act==='light'?'פעילות קלה':act==='moderate'?'פעילות בינונית':'פעילות גבוהה'}</div>
          </div>
          <button onClick={onClose} style={{background:'#1a2233',border:'1px solid #2a3a55',borderRadius:10,width:34,height:34,color:'#6b7a99',fontSize:18,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>✕</button>
        </div>
        {/* Tabs */}
        <div style={{display:'flex',borderBottom:'1px solid #1e2a3a',position:'sticky',top:57,background:'#0d1117',zIndex:9}}>
          <button style={tabS('macros')} onClick={()=>setTab('macros')}>מאקרו</button>
          <button style={tabS('minerals')} onClick={()=>setTab('minerals')}>מינרלים</button>
          <button style={tabS('vitamins')} onClick={()=>setTab('vitamins')}>ויטמינים</button>
        </div>

        <div style={{padding:'8px 14px 50px'}}>
          {tab==='macros'&&(
            <>
              {/* Quick summary */}
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:12,marginTop:6}}>
                {['cal','protein'].map(k=>{
                  const item=personalGoals[k];
                  const pct=Math.min(Math.round((item.actual/item.target)*100),100);
                  return(
                    <div key={k} style={{background:'#131929',borderRadius:12,padding:10,border:'1px solid #1e2a3a'}}>
                      <div style={{fontSize:10,color:'#6b7a99',marginBottom:3}}>{item.emoji} {item.label}</div>
                      <div style={{fontSize:18,fontWeight:800,color:item.color}}>{Math.round(item.actual)}<span style={{fontSize:10,color:'#4a5a72',fontWeight:400}}>/{item.target}{item.unit}</span></div>
                      <div style={{height:4,borderRadius:99,background:'#1e2433',marginTop:5,overflow:'hidden'}}>
                        <div style={{height:'100%',width:`${pct}%`,background:pct>=100?'#22c55e':item.color,borderRadius:99}}/>
                      </div>
                      <div style={{fontSize:10,fontWeight:700,color:pct>=100?'#22c55e':item.color,marginTop:3}}>{pct}%</div>
                    </div>
                  );
                })}
              </div>
              {Object.values(personalGoals).map(item=><NRow key={item.label} item={item}/>)}
              <div style={{marginTop:10,fontSize:10,color:'#3a4a66',background:'#131929',borderRadius:8,padding:'6px 10px'}}>
                💡 ערכים מחושבים מה שאכלת היום ומתעדכנים בזמן אמת
              </div>
            </>
          )}
          {tab==='minerals'&&(
            <>
              <div style={{fontSize:11,color:'#4a5a72',margin:'8px 0 10px',background:'#131929',borderRadius:8,padding:'6px 10px'}}>
                ⚡ יעדים אישיים לפי רמת הפעילות שלך. מעקב מינרלים יתווסף בגרסה הבאה.
              </div>
              {personalMinerals.map(item=><NRow key={item.label} item={{...item,actual:null}}/>)}
            </>
          )}
          {tab==='vitamins'&&(
            <>
              <div style={{fontSize:11,color:'#4a5a72',margin:'8px 0 10px',background:'#131929',borderRadius:8,padding:'6px 10px'}}>
                ☀️ ויטמין D ואומגה 3 חשובים לספורטאים. שקול תוסף.
              </div>
              {personalVitamins.map(item=><NRow key={item.label} item={{...item,actual:null}}/>)}
            </>
          )}
          <div style={{marginTop:14,fontSize:10,color:'#2a3a55',textAlign:'center'}}>מקור: Mayo Clinic · ISSN 2024 · FDA</div>
        </div>
      </div>
    </>
  );
}

// ── Styles ────────────────────────────────────────────────────────
const C={
  app:{background:'#0d1117',minHeight:'100vh',fontFamily:"'Space Grotesk',sans-serif",color:'#f0f4ff',direction:'rtl',maxWidth:440,margin:'0 auto',paddingBottom:80},
  hdr:{padding:'18px 16px 0',display:'flex',justifyContent:'space-between',alignItems:'center'},
  card:{background:'#131929',borderRadius:18,padding:18,margin:'12px 14px 0',border:'1px solid #1e2a3a'},
  ghost:{background:'transparent',color:'#6b7a99',border:'1px solid #1e2a3a',borderRadius:12,padding:'7px 12px',fontWeight:600,fontSize:12,cursor:'pointer'},
  input:{background:'#1a2233',border:'1px solid #2a3a55',borderRadius:12,padding:'10px 14px',color:'#f0f4ff',fontSize:14,width:'100%',boxSizing:'border-box',outline:'none'},
  lbl:{fontSize:12,color:'#6b7a99',marginBottom:4},
};

// ── App ────────────────────────────────────────────────────────────
function App(){
  const [screen,setScreen]=useState('main');
  const [goals,setGoals]=useState({protein:128,calories:2775,carbs:346,fat:86,fiber:39,sugar:69,sodium:2300});
  const [profile,setProfile]=useState({weight:75,activity:'moderate'});
  const [log,setLog]=useState({});
  const [form,setForm]=useState({name:'',cal:'',protein:''});
  const [searchQ,setSearchQ]=useState('');
  const [results,setResults]=useState([]);
  const [saved,setSaved]=useState(false);
  const [loaded,setLoaded]=useState(false);
  const [tab,setTab]=useState('quick');
  const [portionFood,setPortionFood]=useState(null);
  const [showNutrition,setShowNutrition]=useState(false);
  const [camState,setCamState]=useState('idle');
  const [camResult,setCamResult]=useState(null);
  const [camImgUrl,setCamImgUrl]=useState(null);
  const [camError,setCamError]=useState('');
  const cameraRef=useRef(null);
  const galleryRef=useRef(null);
  const [sw,setSw]=useState(75);
  const [sa,setSa]=useState('moderate');

  useEffect(()=>{
    const g=store.get(KEYS.GOALS); if(g) setGoals(g);
    const p=store.get(KEYS.PROFILE); if(p){setProfile(p);setSw(p.weight);setSa(p.activity);}
    const l=store.get(KEYS.LOG); if(l) setLog(l);
    setLoaded(true);
  },[]);
  useEffect(()=>{if(screen==='setup'){setSw(profile.weight);setSa(profile.activity);}},[screen]);

  const save=(key,val,setter)=>{setter(val);store.set(key,val);};
  const today=getTodayKey();
  const todayLog=log[today]||[];
  const totP=todayLog.reduce((s,e)=>s+Number(e.protein||0),0);
  const totC=todayLog.reduce((s,e)=>s+Number(e.cal||0),0);

  const addEntry=e=>{
    const nl={...log,[today]:[...todayLog,{...e,time:new Date().toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'})}]};
    save(KEYS.LOG,nl,setLog);
  };
  const removeEntry=i=>save(KEYS.LOG,{...log,[today]:todayLog.filter((_,j)=>j!==i)},setLog);

  const handleFile=async(e)=>{
    const file=e.target.files?.[0]; if(!file) return;
    e.target.value='';
    const url=URL.createObjectURL(file);
    setCamImgUrl(url); setCamState('analyzing'); setCamError('');
    try{
      const b64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(file);});
      const result=await analyzeImage(b64,file.type||'image/jpeg');
      if(!result.items?.length){setCamError(result.note||'לא זוהה אוכל');setCamState('error');}
      else{setCamResult(result);setCamState('result');}
    }catch{setCamError('שגיאה בניתוח. בדוק חיבור.');setCamState('error');}
  };
  const closeCam=()=>{setCamState('idle');setCamResult(null);if(camImgUrl)URL.revokeObjectURL(camImgUrl);setCamImgUrl(null);};
  const doSearch=q=>{setSearchQ(q);setResults(q?FOOD_DB.filter(f=>f.name.includes(q)||f.tag.includes(q)).slice(0,10):[]);};
  const doManualAdd=()=>{
    if(!form.name||!form.cal||!form.protein) return;
    addEntry({name:form.name,cal:Number(form.cal),protein:Number(form.protein),carbs:0,fat:0,fiber:0,sugar:0,sodium:0,emoji:'🍽️'});
    setForm({name:'',cal:'',protein:''});setSaved(true);setTimeout(()=>setSaved(false),1500);
  };

  const suggested=calcGoals(sw,sa);

  if(!loaded) return<div style={{background:'#0d1117',minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center'}}><span style={{color:'#6b7a99'}}>טוען...</span></div>;

  // ── SETUP ─────────────────────────────────────────────────────
  if(screen==='setup') return(
    <div style={C.app}>
      <div style={C.hdr}>
        <div><div style={{fontSize:21,fontWeight:800}}>⚙️ הגדרות</div><div style={{color:'#6b7a99',fontSize:12,marginTop:2}}>מכוון יעדים בדיוק עבורך</div></div>
        <button style={C.ghost} onClick={()=>setScreen('main')}>חזרה</button>
      </div>
      <div style={C.card}>
        <div style={{marginBottom:14}}><div style={C.lbl}>משקל (ק"ג)</div><input style={C.input} type="number" value={sw} onChange={e=>setSw(Number(e.target.value))}/></div>
        <div style={{marginBottom:14}}>
          <div style={C.lbl}>רמת פעילות שבועית</div>
          <div style={{display:'flex',gap:8}}>
            {[['light','קלה\n1-2x 🚶'],['moderate','בינונית\n3-4x 🏃'],['high','גבוהה\n5+x 💪']].map(([v,l])=>(
              <button key={v} onClick={()=>setSa(v)}
                style={{...C.ghost,flex:1,background:sa===v?'#1d4ed8':'transparent',color:sa===v?'#fff':'#6b7a99',borderColor:sa===v?'#3b82f6':'#1e2a3a',whiteSpace:'pre-line',lineHeight:1.3,padding:'8px 6px',fontSize:11}}>
                {l}
              </button>
            ))}
          </div>
        </div>
        <div style={{background:'#0d1117',borderRadius:14,padding:14,marginBottom:14}}>
          <div style={{fontSize:12,color:'#6b7a99',marginBottom:8}}>יעדים מחושבים לך (Mayo Clinic + ISSN 2024)</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8}}>
            {[["⚡ קלוריות",suggested.calories,"קל'",'#f59e0b'],["💪 חלבון",suggested.protein,'g','#22d3ee'],["🌾 פחמימות",suggested.carbs,'g','#a78bfa'],
              ["🫒 שומן",suggested.fat,'g','#fbbf24'],["🥦 סיבים",suggested.fiber,'g','#86efac'],["🧂 נתרן",suggested.sodium,'mg','#94a3b8']].map(([l,v,u,c])=>(
              <div key={l} style={{background:'#131929',borderRadius:10,padding:8,textAlign:'center'}}>
                <div style={{fontSize:16,fontWeight:800,color:c}}>{v}</div>
                <div style={{fontSize:9,color:'#6b7a99'}}>{l} {u}</div>
              </div>
            ))}
          </div>
        </div>
        <div style={{marginBottom:14}}>
          <div style={C.lbl}>יעד חלבון ידני (אם הרופא המליץ אחרת)</div>
          <div style={{display:'flex',gap:8}}>
            <div style={{flex:1}}><div style={{fontSize:10,color:'#6b7a99',marginBottom:3}}>חלבון (g)</div><input style={C.input} type="number" value={goals.protein} onChange={e=>setGoals(g=>({...g,protein:Number(e.target.value)||g.protein}))}/></div>
            <div style={{flex:1}}><div style={{fontSize:10,color:'#6b7a99',marginBottom:3}}>קלוריות</div><input style={C.input} type="number" value={goals.calories} onChange={e=>setGoals(g=>({...g,calories:Number(e.target.value)||g.calories}))}/></div>
          </div>
        </div>
        <button style={{background:'#22c55e',color:'#fff',border:'none',borderRadius:12,padding:13,fontWeight:800,fontSize:16,cursor:'pointer',width:'100%',marginBottom:8}}
          onClick={()=>{save(KEYS.PROFILE,{weight:sw,activity:sa},setProfile);save(KEYS.GOALS,suggested,setGoals);setScreen('main');}}>
          שמור + השתמש בחישוב האוטומטי ✓
        </button>
        <button style={{...C.ghost,width:'100%',textAlign:'center',padding:10}}
          onClick={()=>{save(KEYS.PROFILE,{weight:sw,activity:sa},setProfile);save(KEYS.GOALS,goals,setGoals);setScreen('main');}}>
          שמור עם יעד ידני
        </button>
      </div>
    </div>
  );

  // ── HISTORY ────────────────────────────────────────────────────
  if(screen==='history'){
    const days=Object.keys(log).sort((a,b)=>b.localeCompare(a)).slice(0,30);
    return(
      <div style={C.app}>
        <div style={C.hdr}>
          <div><div style={{fontSize:21,fontWeight:800}}>📅 היסטוריה</div><div style={{color:'#6b7a99',fontSize:12,marginTop:2}}>30 יום אחרונים</div></div>
          <button style={C.ghost} onClick={()=>setScreen('main')}>חזרה</button>
        </div>
        {days.length===0&&<div style={{...C.card,color:'#6b7a99',textAlign:'center',padding:30}}>אין עדיין נתונים</div>}
        {days.map(day=>{
          const ent=log[day]||[];
          const p=ent.reduce((s,e)=>s+Number(e.protein||0),0);
          const c=ent.reduce((s,e)=>s+Number(e.cal||0),0);
          const hit=p>=goals.protein;
          return(
            <div key={day} style={{...C.card,borderColor:day===today?'#3b82f6':'#1e2a3a'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
                <div><span style={{fontWeight:700,fontSize:14}}>{day===today?'היום ⬅️':day}</span><span style={{fontSize:11,color:'#6b7a99',marginRight:8}}>{ent.length} ארוחות</span></div>
                <span style={{fontSize:13,color:hit?'#22c55e':'#6b7a99',fontWeight:700}}>{hit?'✅ יעד!':Math.round(p)+'/'+goals.protein+'g'}</span>
              </div>
              <div style={{display:'flex',gap:20,marginBottom:8}}>
                <div><span style={{fontSize:19,fontWeight:800,color:'#22d3ee'}}>{Math.round(p)}g</span><span style={{fontSize:11,color:'#6b7a99',marginRight:4}}>חלבון</span></div>
                <div><span style={{fontSize:19,fontWeight:800,color:'#f59e0b'}}>{Math.round(c)}</span><span style={{fontSize:11,color:'#6b7a99',marginRight:4}}>קל'</span></div>
              </div>
              <div style={{height:6,borderRadius:99,background:'#1e2433',overflow:'hidden'}}>
                <div style={{height:'100%',width:`${Math.min((p/goals.protein)*100,100)}%`,background:hit?'#22c55e':'#22d3ee',borderRadius:99}}/>
              </div>
            </div>
          );
        })}
        <div style={{height:20}}/>
      </div>
    );
  }

  // ── MAIN ──────────────────────────────────────────────────────
  const tabBtn=(t,label)=>(
    <button onClick={()=>setTab(t)}
      style={{flex:1,background:tab===t?'#1d4ed8':'transparent',color:tab===t?'#fff':'#6b7a99',
        border:tab===t?'1px solid #3b82f6':'1px solid #1e2a3a',
        borderRadius:10,padding:'7px 0',fontWeight:700,fontSize:12,cursor:'pointer'}}>
      {label}
    </button>
  );

  return(
    <div style={C.app}>
      <input ref={cameraRef} type="file" accept="image/*" capture="environment" style={{display:'none'}} onChange={handleFile}/>
      <input ref={galleryRef} type="file" accept="image/*" style={{display:'none'}} onChange={handleFile}/>
      {portionFood&&<PortionModal food={portionFood} onConfirm={e=>{addEntry(e);setPortionFood(null);setSearchQ('');setResults([]);}} onClose={()=>setPortionFood(null)}/>}
      {camState==='result'&&camResult&&<CameraModal result={camResult} imageUrl={camImgUrl} onConfirm={addEntry} onClose={closeCam}/>}
      {showNutrition&&<NutritionPanel goals={goals} profile={profile} todayLog={todayLog} onClose={()=>setShowNutrition(false)}/>}

      <div style={C.hdr}>
        <div>
          <div style={{fontSize:21,fontWeight:800,letterSpacing:-0.5}}>💪 Protein Day</div>
          <div style={{color:'#6b7a99',fontSize:11,marginTop:2}}>{new Date().toLocaleDateString('he-IL',{weekday:'long',day:'numeric',month:'long'})}</div>
        </div>
        <div style={{display:'flex',gap:6}}>
          <button style={{...C.ghost,fontSize:16,padding:'6px 10px'}} onClick={()=>setShowNutrition(true)}>📊</button>
          <button style={C.ghost} onClick={()=>setScreen('history')}>📅</button>
          <button style={C.ghost} onClick={()=>setScreen('setup')}>⚙️</button>
        </div>
      </div>

      {/* Rings */}
      <div style={{...C.card,display:'flex',justifyContent:'space-around'}}>
        <Ring value={totP} max={goals.protein} color={totP>=goals.protein?'#22c55e':'#22d3ee'} label="חלבון" sub="גרם"/>
        <Ring value={totC} max={goals.calories} color={totC>goals.calories*1.1?'#ef4444':'#f59e0b'} label="קלוריות" sub="קל'"/>
      </div>

      {/* Status */}
      <div style={{...C.card,textAlign:'center',padding:'12px 18px'}}>
        {totP>=goals.protein
          ?<div style={{color:'#22c55e',fontWeight:700,fontSize:15}}>🎉 עמדת ביעד החלבון היום!</div>
          :<div>
            <span style={{color:'#f0f4ff',fontWeight:600}}>נותרו עוד </span>
            <span style={{color:'#22d3ee',fontWeight:800,fontSize:17}}>{Math.round(goals.protein-totP)}g</span>
            <span style={{color:'#f0f4ff',fontWeight:600}}> חלבון</span>
            <div style={{fontSize:11,color:'#6b7a99',marginTop:3}}>≈ {Math.ceil((goals.protein-totP)/25)} מנות נוספות</div>
          </div>
        }
      </div>

      {/* Camera buttons */}
      <div style={{margin:'12px 14px 0',display:'flex',gap:8}}>
        <button onClick={()=>cameraRef.current?.click()} disabled={camState==='analyzing'}
          style={{flex:2,padding:'14px 16px',background:'linear-gradient(135deg,#1a3060,#0e1e40)',border:'1px solid #1e3a70',cursor:camState==='analyzing'?'not-allowed':'pointer',display:'flex',alignItems:'center',gap:10,borderRadius:16,boxSizing:'border-box'}}>
          {camState==='analyzing'
            ?<><div style={{width:24,height:24,border:'3px solid #3b82f6',borderTopColor:'transparent',borderRadius:'50%',animation:'spin 0.8s linear infinite',flexShrink:0}}/><span style={{color:'#a0b0cc',fontWeight:700,fontSize:14}}>מנתח...</span></>
            :<><span style={{fontSize:26}}>📷</span><div style={{textAlign:'right'}}><div style={{color:'#e0ecff',fontWeight:800,fontSize:14}}>צלם ישירות</div><div style={{color:'#4a6a99',fontSize:10,marginTop:1}}>AI מזהה + מחשב הכול</div></div></>
          }
        </button>
        <button onClick={()=>galleryRef.current?.click()} disabled={camState==='analyzing'}
          style={{flex:1,padding:'14px 10px',background:'#131929',border:'1px solid #2a3a55',cursor:camState==='analyzing'?'not-allowed':'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:8,borderRadius:16,boxSizing:'border-box'}}>
          <span style={{fontSize:22}}>🖼️</span>
          <div style={{textAlign:'right'}}><div style={{color:'#a0b0cc',fontWeight:700,fontSize:13}}>גלריה</div></div>
        </button>
      </div>
      {camState==='error'&&(
        <div style={{margin:'0 14px',background:'#1a0f0f',borderRadius:'0 0 12px 12px',padding:'8px 14px',display:'flex',gap:8,alignItems:'center',border:'1px solid #3a1515',borderTop:'none'}}>
          <span>⚠️</span><span style={{fontSize:12,color:'#ef4444',flex:1}}>{camError}</span>
          <button onClick={()=>setCamState('idle')} style={{background:'none',border:'none',color:'#6b7a99',cursor:'pointer',fontSize:12}}>סגור</button>
        </div>
      )}

      {/* Add panel */}
      <div style={C.card}>
        <div style={{display:'flex',gap:6,marginBottom:12}}>
          {tabBtn('quick','⚡ מהיר')}
          {tabBtn('search','🔍 חיפוש')}
          {tabBtn('manual','✏️ ידני')}
        </div>
        {tab==='quick'&&(
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
            {QUICK_FOODS.map(f=>(
              <button key={f.name} onClick={()=>setPortionFood(f)}
                style={{background:'#1a2233',border:'1px solid #2a3a55',borderRadius:12,padding:'10px 10px',cursor:'pointer',textAlign:'right'}}
                onTouchStart={e=>e.currentTarget.style.background='#1e2a40'}
                onTouchEnd={e=>e.currentTarget.style.background='#1a2233'}>
                <div style={{fontSize:18}}>{f.emoji}</div>
                <div style={{fontSize:12,fontWeight:700,color:'#f0f4ff'}}>{f.name}</div>
                <div style={{fontSize:10,color:'#6b7a99'}}>{f.protein}g חלבון | {f.cal}קל'</div>
              </button>
            ))}
          </div>
        )}
        {tab==='search'&&(
          <div>
            <input style={{...C.input,marginBottom:10}} placeholder="חפש... (עוף, בירה, שוקולד, וויסקי...)"
              value={searchQ} onChange={e=>doSearch(e.target.value)}/>
            {!searchQ&&(
              <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
                {['עוף','בשר','דגים','ביצים','חלב','תוספים','חטיפים','שתייה','ירקות','פירות','ארוחות','אגוזים','שמנים'].map(tag=>(
                  <button key={tag} onClick={()=>doSearch(tag)}
                    style={{background:'#1a2233',border:'1px solid #2a3a55',borderRadius:20,padding:'4px 10px',fontSize:11,color:'#a0b0cc',cursor:'pointer'}}>
                    {tag}
                  </button>
                ))}
              </div>
            )}
            {results.length>0&&results.map(f=>(
              <button key={f.name} onClick={()=>setPortionFood(f)}
                style={{background:'#1a2233',border:'1px solid #2a3a55',borderRadius:12,padding:'9px 12px',cursor:'pointer',display:'flex',justifyContent:'space-between',alignItems:'center',width:'100%',marginBottom:6}}>
                <div style={{display:'flex',alignItems:'center',gap:8}}>
                  <span style={{fontSize:18}}>{f.emoji}</span>
                  <div style={{textAlign:'right'}}>
                    <div style={{fontSize:13,fontWeight:700,color:'#f0f4ff'}}>{f.name}</div>
                    <div style={{fontSize:10,color:'#6b7a99'}}>{f.tag}</div>
                  </div>
                </div>
                <div style={{textAlign:'left',flexShrink:0,direction:'ltr'}}>
                  <div style={{fontSize:13,fontWeight:800,color:'#22d3ee'}}>{f.protein}g pro</div>
                  <div style={{fontSize:10,color:'#6b7a99'}}>{f.cal}cal · {f.carbs}g carb</div>
                </div>
              </button>
            ))}
            {searchQ&&results.length===0&&<div style={{color:'#6b7a99',fontSize:13,textAlign:'center',padding:12}}>לא נמצא</div>}
          </div>
        )}
        {tab==='manual'&&(
          <div>
            <div style={{fontSize:11,color:'#4a5a72',marginBottom:8,background:'#0d1117',borderRadius:8,padding:'6px 10px'}}>
              💡 הוספה ידנית סופרת רק חלבון וקלוריות. לערכים מלאים — חפש ממסד הנתונים.
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:8}}>
              <input style={C.input} placeholder="שם המזון" value={form.name} onChange={e=>setForm({...form,name:e.target.value})}/>
              <div style={{display:'flex',gap:8}}>
                <input style={C.input} type="number" placeholder="גרם חלבון" value={form.protein} onChange={e=>setForm({...form,protein:e.target.value})}/>
                <input style={C.input} type="number" placeholder="קלוריות" value={form.cal} onChange={e=>setForm({...form,cal:e.target.value})}/>
              </div>
              <button style={{background:saved?'#22c55e':'#3b82f6',color:'#fff',border:'none',borderRadius:12,padding:'10px',fontWeight:700,fontSize:14,cursor:'pointer',transition:'background 0.3s'}}
                onClick={doManualAdd}>{saved?'✓ נשמר!':'+ הוסף'}</button>
            </div>
          </div>
        )}
      </div>

      {/* Today log */}
      {todayLog.length>0&&(
        <div style={C.card}>
          <div style={{fontWeight:700,marginBottom:10}}>מה אכלת היום ({todayLog.length})</div>
          {todayLog.map((e,i)=>(
            <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'7px 0',borderBottom:i<todayLog.length-1?'1px solid #1e2433':'none'}}>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <span style={{fontSize:17}}>{e.emoji||'🍽️'}</span>
                <div>
                  <div style={{fontWeight:600,fontSize:13}}>{e.name}</div>
                  <div style={{fontSize:10,color:'#6b7a99'}}>{e.time} · {e.carbs||0}g פחמ · {e.fat||0}g שומן</div>
                </div>
              </div>
              <div style={{display:'flex',alignItems:'center',gap:10}}>
                <div style={{textAlign:'left'}}>
                  <span style={{color:'#22d3ee',fontWeight:700,fontSize:13}}>{e.protein}g</span>
                  <span style={{color:'#6b7a99',fontSize:11,marginRight:4}}>|{e.cal}</span>
                </div>
                <button onClick={()=>removeEntry(i)} style={{background:'none',border:'none',color:'#3a4a66',cursor:'pointer',fontSize:15,padding:0}}>✕</button>
              </div>
            </div>
          ))}
        </div>
      )}
      <div style={{height:20}}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  });
}
</script>
</body>
</html>
